name: Generate Pac-Man Contribution Graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate Pacman graph
        uses: Platane/snk@v3
        with:
          github_user_name: YOUR_USERNAME
          color_snake: "#00f5ff"
          color_dots: "#0a0a0a,#0ff0ff,#00f5ff,#8a2be2,#39ff14"
          outputs: |
            dist/pacman.svg
            dist/pacman-dark.svg?palette=github-dark

      - name: Commit generated files
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: generate pacman contribution graph"
          add: "dist/*.svg"
